name: Meta Chief Audit Fixes

on:
  pull_request:
    paths:
      - 'meta-chief-of-staff-agent/**'
      - '.github/workflows/meta-chief-audit-fixes.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: meta-chief-of-staff-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Verify deterministic audit fixes
        run: npm run verify
