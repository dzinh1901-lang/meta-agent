name: Meta Chief Verify

on:
  pull_request:
    paths:
      - 'meta-chief-of-staff-agent/**'
      - '.github/workflows/meta-chief-verify.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: meta-chief-of-staff-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install audited dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate project contracts
        run: npm run validate

      - name: Run Phase 2 policy tests
        run: npm run test:phase2

      - name: Run Phase 3 packet tests
        run: npm run test:phase3

      - name: Run Phase 4 routing, procurement, and specialist tests
        id: phase4
        continue-on-error: true
        run: (npm run test:phase4 && npm run test:phase4:specialists) > phase4.log 2>&1

      - name: Report Phase 4 diagnostics
        if: steps.phase4.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const log = fs.readFileSync('meta-chief-of-staff-agent/phase4.log', 'utf8');
            const tail = log.split('\n').slice(-100).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- meta-chief-phase4-diagnostic -->\n### Phase 4 diagnostic\n\n\`\`\`text\n${tail}\n\`\`\``,
            });

      - name: Fail on Phase 4 test failure
        if: steps.phase4.outcome == 'failure'
        run: cat phase4.log && exit 1

      - name: Type-check Agents SDK runtime
        run: npm run typecheck

      - name: Smoke-check Agents SDK graph
        run: npm run sdk:smoke
