name: Meta Chief Verify

on:
  pull_request:
    paths:
      - 'meta-chief-of-staff-agent/**'
      - '.github/workflows/meta-chief-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: meta-chief-of-staff-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install audited dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Verify deterministic phases and SDK graph
        run: npm run verify
